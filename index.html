<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Kode Produk Badan Hukum Desa</title>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f3f4f6; }
        .hidden-login { display: none; }
        @media print {
            .no-print { display: none; }
            .print-only { display: block; }
        }
        /* Custom Styling for Searchable Select */
        .dropdown-container { position: relative; }
        #searchKlasifikasi { width: 100%; padding: 8px; border: 1px solid #d1d5db; border-radius: 4px; outline: none; margin-bottom: 2px; }
        #klasifikasiList { 
            position: absolute; 
            z-index: 100; 
            width: 100%; 
            max-height: 200px; 
            overflow-y: auto; 
            background: white; 
            border: 1px solid #d1d5db; 
            border-radius: 4px; 
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            display: none;
        }
        .klasifikasi-item { padding: 8px 12px; cursor: pointer; font-size: 0.875rem; border-bottom: 1px solid #f3f4f6; }
        .klasifikasi-item:hover { background-color: #eff6ff; color: #1e40af; }
        .klasifikasi-group { background: #f9fafb; font-weight: bold; font-size: 0.75rem; padding: 4px 12px; color: #6b7280; border-bottom: 1px solid #f3f4f6; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Navigasi -->
    <nav class="bg-blue-800 text-white p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex justify-between items-center">
            <h1 class="font-bold text-lg md:text-xl flex items-center gap-2">
                <span>📋</span> <span class="hidden md:inline">Kode Produk Badan Hukum Desa</span>
                <span class="md:hidden">E-Dokumen</span>
            </h1>
            <div class="flex gap-2">
                <button id="toggleLoginBtn" onclick="toggleLoginSection()" class="bg-blue-700 hover:bg-blue-600 px-3 py-1 rounded text-sm transition">
                    Login/Admin
                </button>
                <button id="logoutBtn" onclick="handleLogout()" class="hidden bg-red-600 hover:bg-red-500 px-3 py-1 rounded text-sm transition">
                    Logout
                </button>
            </div>
        </div>
    </nav>

    <!-- Section Login -->
    <div id="loginSection" class="hidden-login container mx-auto mt-6 px-4">
        <div class="max-w-md mx-auto bg-white p-6 rounded-xl shadow-md border border-gray-200">
            <h2 class="text-xl font-semibold mb-4 text-center">Akses Administrator</h2>
            <div class="space-y-4">
                <input type="text" id="username" placeholder="Username" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                
                <div class="relative">
                    <input type="password" id="password" placeholder="Password" class="w-full p-3 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <button type="button" onclick="togglePasswordVisibility()" class="absolute right-3 top-3 text-gray-500 hover:text-blue-600">
                        <span id="passIcon">👁️</span>
                    </button>
                </div>

                <button onclick="handleLogin()" class="w-full bg-blue-600 text-white py-3 rounded-lg font-bold hover:bg-blue-700 transition">Masuk</button>
            </div>
            <p id="loginError" class="text-red-500 text-sm mt-3 text-center hidden">Username atau Password salah!</p>
        </div>
    </div>

    <!-- Main Content -->
    <main id="mainContent" class="container mx-auto mt-6 px-4 pb-20">
        
        <!-- Form Input (Admin) -->
        <div id="adminForm" class="hidden mb-8 bg-white p-6 rounded-xl shadow-md border border-blue-100">
            <h2 class="text-lg font-bold mb-4 text-blue-800 flex items-center gap-2">
                <span>➕</span> Input Data Dokumen Baru
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Nomor Urut</label>
                    <input type="number" id="inputNoUrut" oninput="checkDuplicateNo(this)" class="w-full p-2 border rounded mt-1 outline-none" placeholder="Contoh: 1">
                </div>
                <div class="dropdown-container">
                    <label class="block text-sm font-medium text-gray-700">Klasifikasi (Cari Otomatis)</label>
                    <input type="text" id="searchKlasifikasi" onfocus="showKlasifikasiList()" onkeyup="filterKlasifikasi()" placeholder="Ketik untuk mencari..." class="mt-1">
                    <input type="hidden" id="inputKlasifikasi">
                    <div id="klasifikasiList"></div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Keterangan / Judul Dokumen</label>
                    <input type="text" id="inputKeterangan" class="w-full p-2 border rounded mt-1 outline-none" placeholder="Nama Dokumen...">
                </div>
                <div class="md:col-span-3 flex justify-end gap-2">
                    <button id="cancelEdit" onclick="resetForm()" class="hidden bg-gray-500 text-white px-6 py-2 rounded-lg hover:bg-gray-600">Batal</button>
                    <button onclick="saveData()" class="bg-green-600 text-white px-8 py-2 rounded-lg font-bold hover:bg-green-700 transition">Simpan Data</button>
                </div>
            </div>
        </div>

        <!-- Tabel & Pencarian -->
        <div class="bg-white rounded-xl shadow-md overflow-hidden border border-gray-200">
            <div class="p-4 bg-gray-50 border-b flex flex-col md:flex-row justify-between items-center gap-4">
                <div class="relative w-full md:w-1/3">
                    <input type="text" id="searchInput" onkeyup="renderTable()" placeholder="Cari nomor, kode, atau dokumen..." class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
                    <span class="absolute left-3 top-2.5 text-gray-400">🔍</span>
                </div>

                    <button onclick="window.print()" class="whitespace-nowrap bg-gray-800 text-white px-3 py-2 rounded text-sm flex items-center gap-1"><span class="hidden sm:inline">🖨️ Cetak</span><span class="sm:hidden">🖨️</span></button>
                    <button onclick="downloadPDF()" class="whitespace-nowrap bg-red-600 text-white px-3 py-2 rounded text-sm flex items-center gap-1"><span class="hidden sm:inline">📄 PDF</span><span class="sm:hidden">📄</span></button>
                    <button onclick="downloadWord()" class="whitespace-nowrap bg-blue-600 text-white px-3 py-2 rounded text-sm flex items-center gap-1"><span class="hidden sm:inline">📝 Word</span><span class="sm:hidden">📝</span></button>
                </div>
            </div>

            <div class="overflow-x-auto">
                <table id="dataTable" class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-blue-50 text-blue-900 uppercase text-xs font-bold">
                            <th class="p-4 border-b text-center w-12">No.</th>
                            <th class="p-4 border-b text-center w-16">No Urut</th>
                            <th class="p-4 border-b">Klasifikasi & Keterangan</th>
                            <th class="p-4 border-b">Keterangan Dokumen</th>
                            <th class="p-4 border-b text-center no-print">Aksi</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="text-sm text-gray-700">
                        <!-- Data rows -->
                    </tbody>
                </table>
            </div>
            <div id="noData" class="p-10 text-center text-gray-500 hidden">Tidak ada data ditemukan.</div>
        </div>
    </main>

    <!-- Footer Mobile -->

        <div class="text-center">

        let appData = JSON.parse(localStorage.getItem('desa_docs')) || [];
        let isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
        let editId = null;

        window.onload = () => {
            renderKlasifikasiList();
            checkAuthStatus();
            renderTable();
            
            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.dropdown-container')) {
                    document.getElementById('klasifikasiList').style.display = 'none';
                }
            });

            const loginInputs = ['username', 'password'];
            loginInputs.forEach(id => {
                document.getElementById(id).addEventListener('keypress', (e) => {
                    if (e.key === 'Enter') handleLogin();
                });
            });
        };

        // --- SEARCHABLE DROPDOWN LOGIC ---
        function renderKlasifikasiList(filter = "") {
            const list = document.getElementById('klasifikasiList');
            list.innerHTML = '';
            
            let hasResults = false;
            masterKlasifikasi.forEach(group => {
                const filteredItems = group.items.filter(item => 
                    item.code.toLowerCase().includes(filter.toLowerCase()) || 
                    item.desc.toLowerCase().includes(filter.toLowerCase())
                );

                if (filteredItems.length > 0) {
                    hasResults = true;
                    const groupTitle = document.createElement('div');
                    groupTitle.className = 'klasifikasi-group';
                    groupTitle.textContent = group.cat;
                    list.appendChild(groupTitle);

                    filteredItems.forEach(item => {
                        const div = document.createElement('div');
                        div.className = 'klasifikasi-item';
                        div.textContent = `${item.code} : ${item.desc}`;
                        div.onclick = () => selectKlasifikasi(item.code, item.desc);
                        list.appendChild(div);
                    });
                }
            });

            if (!hasResults) {
                list.innerHTML = '<div class="p-4 text-xs text-gray-400 italic">Tidak ditemukan...</div>';
            }
        }

        function filterKlasifikasi() {
            const val = document.getElementById('searchKlasifikasi').value;
            renderKlasifikasiList(val);
            document.getElementById('klasifikasiList').style.display = 'block';
        }

        function showKlasifikasiList() {
            document.getElementById('klasifikasiList').style.display = 'block';
            renderKlasifikasiList(document.getElementById('searchKlasifikasi').value);
        }

        function selectKlasifikasi(code, desc) {
            const fullVal = `${code} | ${desc}`;
            document.getElementById('inputKlasifikasi').value = fullVal;
            document.getElementById('searchKlasifikasi').value = fullVal;
            document.getElementById('klasifikasiList').style.display = 'none';
        }

        // --- AUTH LOGIC ---
        function toggleLoginSection() {
            const sec = document.getElementById('loginSection');
            sec.style.display = (sec.style.display === 'block') ? 'none' : 'block';
        }

        function togglePasswordVisibility() {
            const passInput = document.getElementById('password');
            const icon = document.getElementById('passIcon');
            if (passInput.type === 'password') {
                passInput.type = 'text';
                icon.textContent = '🙈';
            } else {
                passInput.type = 'password';
                icon.textContent = '👁️';
            }
        }

        function checkAuthStatus() {
            const adminForm = document.getElementById('adminForm');
            const logoutBtn = document.getElementById('logoutBtn');
            const toggleLoginBtn = document.getElementById('toggleLoginBtn');

            if (isLoggedIn) {
                adminForm.classList.remove('hidden');
                logoutBtn.classList.remove('hidden');
                toggleLoginBtn.classList.add('hidden');
                document.getElementById('loginSection').style.display = 'none';
            } else {
                adminForm.classList.add('hidden');
                logoutBtn.classList.add('hidden');
                toggleLoginBtn.classList.remove('hidden');
            }
            renderTable();
        }

        function handleLogin() {
            const u = document.getElementById('username').value.toLowerCase();
            const p = document.getElementById('password').value.toLowerCase();
            if (u === 'kliwon03' && p === 'ramwet03') {
                isLoggedIn = true;
                localStorage.setItem('isLoggedIn', 'true');
                document.getElementById('loginError').classList.add('hidden');
                checkAuthStatus();
                document.getElementById('username').value = '';
                document.getElementById('password').value = '';
            } else {
                document.getElementById('loginError').classList.remove('hidden');
            }
        }

        function handleLogout() {
            isLoggedIn = false;
            localStorage.setItem('isLoggedIn', 'false');
            checkAuthStatus();
        }

        // --- DATA LOGIC ---
        function checkDuplicateNo(el) {
            const val = parseInt(el.value);
            if (!val) return;
            const duplicate = appData.find(d => d.noUrut === val && d.id !== editId);
            if (duplicate) {
                alert(`Peringatan: Nomor Urut ${val} sudah digunakan oleh "${duplicate.keterangan}". Input akan dihapus.`);
                el.value = '';
            }
        }

        function saveData() {
            const noUrut = parseInt(document.getElementById('inputNoUrut').value);
            const klasifikasi = document.getElementById('inputKlasifikasi').value;
            const keterangan = document.getElementById('inputKeterangan').value;

            if (!noUrut || !klasifikasi || !keterangan) {
                alert("Harap isi semua kolom termasuk Klasifikasi!");
                return;
            }

            if (editId) {
                const index = appData.findIndex(d => d.id === editId);
                appData[index] = { ...appData[index], noUrut, klasifikasi, keterangan };
            } else {
                const newData = {
                    id: Date.now(),
                    noUrut,
                    klasifikasi,
                    keterangan,
                    timestamp: new Date().toLocaleString('id-ID')
                };
                appData.push(newData);
            }

            appData.sort((a, b) => a.noUrut - b.noUrut);
            localStorage.setItem('desa_docs', JSON.stringify(appData));
            resetForm();
            renderTable();
        }

        function resetForm() {
            document.getElementById('inputNoUrut').value = '';
            document.getElementById('inputKeterangan').value = '';
            document.getElementById('inputKlasifikasi').value = '';
            document.getElementById('searchKlasifikasi').value = '';
            editId = null;
            document.getElementById('cancelEdit').classList.add('hidden');
        }

        function renderTable() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const tbody = document.getElementById('tableBody');
            const noData = document.getElementById('noData');
            tbody.innerHTML = '';

            const filteredData = appData.filter(d => 
                d.noUrut.toString().includes(query) || 
                d.klasifikasi.toLowerCase().includes(query) || 
                d.keterangan.toLowerCase().includes(query)
            );

            if (filteredData.length === 0) {
                noData.classList.remove('hidden');
            } else {
                noData.classList.add('hidden');
                filteredData.forEach((d, index) => {
                    const tr = document.createElement('tr');
                    tr.className = "hover:bg-gray-50 border-b transition";
                    tr.innerHTML = `
                        <td class="p-4 text-center text-gray-400 font-mono text-xs">${index + 1}</td>
                        <td class="p-4 text-center font-bold text-blue-600">${d.noUrut}</td>
                        <td class="p-4">
                            <span class="bg-blue-100 text-blue-800 text-[10px] px-2 py-1 rounded font-bold">${d.klasifikasi.split('|')[0]}</span>
                            <div class="mt-1 text-xs text-gray-500 font-semibold">${d.klasifikasi.split('|')[1]}</div>
                        </td>
                        <td class="p-4 font-medium">${d.keterangan}</td>
                        <td class="p-4 text-center no-print">
                            ${isLoggedIn ? `
                                <div class="flex justify-center gap-1">
                                    <button onclick="editData(${d.id})" class="p-2 bg-yellow-100 text-yellow-700 rounded hover:bg-yellow-200" title="Edit">✏️</button>
                                    <button onclick="deleteData(${d.id})" class="p-2 bg-red-100 text-red-700 rounded hover:bg-red-200" title="Hapus">🗑️</button>
                                </div>
                            ` : '<span class="text-xs italic text-gray-400">View Only</span>'}
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            }
        }

        function deleteData(id) {
            if (confirm("Apakah Anda yakin ingin menghapus data ini?")) {
                appData = appData.filter(d => d.id !== id);
                localStorage.setItem('desa_docs', JSON.stringify(appData));
                renderTable();
            }
        }

        function editData(id) {
            const data = appData.find(d => d.id === id);
            if (data) {
                editId = id;
                document.getElementById('inputNoUrut').value = data.noUrut;
                document.getElementById('inputKlasifikasi').value = data.klasifikasi;
                document.getElementById('searchKlasifikasi').value = data.klasifikasi;
                document.getElementById('inputKeterangan').value = data.keterangan;
                document.getElementById('cancelEdit').classList.remove('hidden');
                window.scrollTo({ top: 0, behavior: 'smooth' });
            }
        }

        function downloadPDF() {
            const { jsPDF } = window.jspdf;
            const doc = new jsPDF();
            doc.text("Laporan Klasifikasi Dokumen Desa", 14, 15);
            doc.setFontSize(10);
            doc.text(`Dicetak pada: ${new Date().toLocaleString('id-ID')}`, 14, 22);
            const tableRows = appData.map((d, index) => [index + 1, d.noUrut, d.klasifikasi, d.keterangan]);
            doc.autoTable({
                startY: 30,
                head: [['No.', 'Kode', 'Klasifikasi/Label', 'Keterangan']],
                body: tableRows,
            });
            doc.save("Data_Dokumen_Desa.pdf");
        }

        function downloadWord() {
            let content = `
                <html xmlns:o='urn:schemas-microsoft-com:office:office' xmlns:w='urn:schemas-microsoft-com:office:word' xmlns='http://www.w3.org/TR/REC-html40'>
                <head><meta charset='utf-8'><title>Export Word</title></head>
                <body>
                    <h2 style="text-align:center">Data Klasifikasi Dokumen Desa</h2>
                    <table border="1" style="width:100%; border-collapse:collapse;">
                        <thead>
                            <tr style="background-color:#f2f2f2">
                                <th>No.</th>
                                <th>Kode</th>
                                <th>Klasifikasi</th>
                                <th>Keterangan</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${appData.map((d, index) => `
                                <tr>
                                    <td style="text-align:center">${index + 1}</td>
                                    <td style="text-align:center">${d.noUrut}</td>
                                    <td>${d.klasifikasi}</td>
                                    <td>${d.keterangan}</td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </body>
                </html>
            `;
            const blob = new Blob(['\ufeff', content], { type: 'application/msword' });
            saveAs(blob, 'Data_Dokumen_Desa.doc');
        }
    </script>
</body>
</html>
